name: Omni-Harvester Apex Sweep

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser google-generativeai google-genai pyTelegramBotAPI

      - name: Run Omni-Harvester
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python vanguard_core.py

      - name: Save Super Memory
        run: |
          git config --global user.name "OmniHarvester AI"
          git config --global user.email "ai@omniharvester.local"
          git add omni_memory.json || true
          git commit -m "Autosave: Updated target memory" || true
          git push || true
